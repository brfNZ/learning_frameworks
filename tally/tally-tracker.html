// ─── EMOJI ───
function setEmoji(idx, e) {
    const openEditInput = document.querySelector(`[id^="cef-${idx}-"].open input`);
    if (openEditInput) {
        const cval = openEditInput.value;
        const cs = (openEditInput.selectionStart != null) ? openEditInput.selectionStart : cval.length;
        const ce = (openEditInput.selectionEnd   != null) ? openEditInput.selectionEnd   : cval.length;
        openEditInput.value = cval.slice(0, cs) + e + cval.slice(ce);
        const cp = cs + e.length;
        openEditInput.setSelectionRange(cp, cp);
        openEditInput.focus();
        forceRepaint();
        toast(`${e} added`);
        return;
    }

    const noteEl = document.getElementById(`note-${idx}`);
    if (!noteEl) return;
    const val = noteEl.value;
    if (val.length === 0) {
        noteEl.value = e + ' ';
        noteEl.setSelectionRange(e.length + 1, e.length + 1);
    } else {
        const start = (noteEl.selectionStart != null) ? noteEl.selectionStart : val.length;
        const end   = (noteEl.selectionEnd   != null) ? noteEl.selectionEnd   : val.length;
        noteEl.value = val.slice(0, start) + e + val.slice(end);
        const newPos = start + e.length;
        noteEl.setSelectionRange(newPos, newPos);
    }
    noteEl.focus();
    forceRepaint();
    toast(`${e} added`);
}

// ─── ENTRIES ───
function addEntry(idx, type) {
    const data = load();
    if (!data[idx]) return;
    const c = getCounts(data[idx]);
    const t = parseTarget(data[idx].target);
    if (data[idx].type === 'dual') {
        if ((t.kill > 0 && c.neg >= t.kill) || (t.max > 0 && c.pos >= t.max)) return;
    }
    const noteEl = document.getElementById(`note-${idx}`);
    const note = noteEl ? noteEl.value.trim() : '';
    const emoji = pendingEmoji[idx] || '';
    delete pendingEmoji[idx];
    if (!data[idx].comments) data[idx].comments = [];
    const isCounted = type !== 'note-only';
    data[idx].comments.push({ type: isCounted ? type : 'note', text: note, emoji, counted: isCounted, date: new Date().toISOString() });
    save(data);
    if (noteEl) { noteEl.value = ''; }

    forceRepaint();                    // ← FIX

    // Quote triggers...
    const item = data[idx];
    const c2 = getCounts(item);
    const t2 = parseTarget(item.target);
    const streak2 = getStreak(item);
    const justWon = t2.max > 0 && (item.type === 'dual' ? (type === 'pos' && c2.pos >= t2.max) : (type === 'simple' && c2.simple >= t2.max));
    const justKilled = type === 'neg' && t2.kill > 0 && c2.neg >= t2.kill;
    if (justWon) {
        setTimeout(() => showQuote('win', '🏆 Goal reached!'), 600);
    } else if (justKilled) {
        setTimeout(() => showQuote('loss', '💥 Threshold hit'), 600);
    } else if ([3, 7, 14, 30, 60, 100].includes(streak2)) {
        setTimeout(() => showQuote('streak', `🔥 ${streak2}-day streak!`), 600);
    }

    render();
    const label = type === 'note-only' ? '📝 Note added' : type === 'pos' ? '✓ Win logged' : type === 'neg' ? '✗ Loss logged' : '+ Counted';
    const isCountedEntry = type !== 'note-only';
    showEntryUndoToast(idx, label, isCountedEntry);
}
